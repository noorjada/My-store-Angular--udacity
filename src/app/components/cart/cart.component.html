<div class="cart-page">
    <h1 class="cart-title">Shopping Cart</h1>

    <div *ngIf="cartItems.length === 0" class="empty-cart">
        <span class="empty-icon">🛒</span>
        <p>Your cart is empty</p>
        <a routerLink="/" class="btn-shop">Browse Products</a>
    </div>

    <div *ngIf="cartItems.length > 0" class="cart-content">
        <div class="cart-items">
            <app-cart-item *ngFor="let item of cartItems" [item]="item" (remove)="handleRemove($event)"
                (updateQty)="handleUpdateQty($event)"></app-cart-item>
        </div>

        <div class="cart-summary">
            <div class="summary-card">
                <h2>Order Summary</h2>
                <div class="summary-row">
                    <span>Items ({{ cartItems.length }})</span>
                    <span>{{ total | currency }}</span>
                </div>
                <div class="summary-row total">
                    <span>Total</span>
                    <span>{{ total | currency }}</span>
                </div>
                <a routerLink="/checkout" class="btn-checkout">Proceed to Checkout</a>
            </div>
        </div>
    </div>
</div>
