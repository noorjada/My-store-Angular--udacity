<div class="products-container">
    <div class="header-actions">
        <h2>Manage Products</h2>
        <button class="btn-primary" (click)="openAddForm()">Add New Product</button>
    </div>

    <div class="admin-form-container" *ngIf="showForm">
        <h3>{{ isEditing ? 'Edit Product' : 'Add New Product' }}</h3>
        <form (ngSubmit)="saveProduct()">
            <div class="form-group">
                <label for="name">Product Name</label>
                <input type="text" id="name" name="name" [(ngModel)]="formData.name" required>
            </div>

            <div class="form-group">
                <label for="price">Price ($)</label>
                <input type="number" id="price" name="price" [(ngModel)]="formData.price" required min="0.01"
                    step="0.01">
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" [(ngModel)]="formData.description" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label for="image">Product Image</label>
                <input type="file" id="image" (change)="onFileSelected($event)" accept="image/*">
                <div *ngIf="imagePreview" class="image-preview">
                    <img [src]="imagePreview" alt="Image preview" />
                </div>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-secondary" (click)="closeForm()">Cancel</button>
                <button type="submit" class="btn-primary" [disabled]="!formData.name || !formData.price">Save
                    Product</button>
            </div>
        </form>
    </div>

    <table class="admin-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Image</th>
                <th>Name</th>
                <th>Price</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let product of products">
                <td>{{ product.id }}</td>
                <td>
                    <img [src]="product.url" alt="{{ product.name }}" class="table-img" *ngIf="product.url" />
                    <span *ngIf="!product.url" class="no-img">No Image</span>
                </td>
                <td>{{ product.name }}</td>
                <td>{{ product.price | currency }}</td>
                <td class="action-buttons">
                    <button class="btn-edit" (click)="openEditForm(product)">Edit</button>
                    <button class="btn-delete" (click)="deleteProduct(product.id)">Delete</button>
                </td>
            </tr>
            <tr *ngIf="products.length === 0">
                <td colspan="5" class="text-center">No products found.</td>
            </tr>
        </tbody>
    </table>
</div>
