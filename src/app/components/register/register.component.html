<div class="register-container">
  <div class="register-card">
    <h1 class="register-title">Create Account</h1>

    <div class="error-message" *ngIf="error">
      {{ error }}
    </div>

    <form (ngSubmit)="onSubmit()" novalidate class="register-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          placeholder="your@email.com"
          [(ngModel)]="email"
          name="email"
          [class.invalid]="submitted && !emailValid"
        />
        <p class="error" *ngIf="submitted && !emailValid">
          Please enter a valid email address
        </p>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input
            id="firstName"
            type="text"
            placeholder="John"
            [(ngModel)]="firstName"
            name="firstName"
            [class.invalid]="submitted && !firstNameValid"
          />
          <p class="error" *ngIf="submitted && !firstNameValid">
            First name must be at least 2 characters
          </p>
        </div>

        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input
            id="lastName"
            type="text"
            placeholder="Doe"
            [(ngModel)]="lastName"
            name="lastName"
            [class.invalid]="submitted && !lastNameValid"
          />
          <p class="error" *ngIf="submitted && !lastNameValid">
            Last name must be at least 2 characters
          </p>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          placeholder="Enter a secure password"
          [(ngModel)]="password"
          name="password"
          [class.invalid]="submitted && !passwordValid"
        />
        <p class="error" *ngIf="submitted && !passwordValid">
          Password must be at least 6 characters
        </p>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input
          id="confirmPassword"
          type="password"
          placeholder="Confirm your password"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          [class.invalid]="submitted && !passwordsMatch"
        />
        <p class="error" *ngIf="submitted && !passwordsMatch">
          Passwords must match
        </p>
      </div>

      <button
        type="submit"
        class="submit-btn"
        [disabled]="!isValid && submitted || loading"
      >
        {{ loading ? 'Creating Account...' : 'Register' }}
      </button>
    </form>

    <p class="login-link">
      Already have an account? <a routerLink="/login">Login here</a>
    </p>
  </div>
</div>
