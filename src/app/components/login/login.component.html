<div class="login-container">
  <div class="login-card">
    <h1 class="login-title">Login</h1>

    <div class="error-message" *ngIf="error">
      {{ error }}
    </div>

    <form (ngSubmit)="onSubmit()" novalidate class="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          placeholder="your@email.com"
          [(ngModel)]="email"
          name="email"
          [class.invalid]="submitted && !emailValid"
        />
        <p class="error" *ngIf="submitted && !emailValid">
          Please enter a valid email address
        </p>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          placeholder="Enter your password"
          [(ngModel)]="password"
          name="password"
          [class.invalid]="submitted && !passwordValid"
        />
        <p class="error" *ngIf="submitted && !passwordValid">
          Password must be at least 3 characters
        </p>
      </div>

      <button
        type="submit"
        class="submit-btn"
        [disabled]="!isValid && submitted || loading"
      >
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>
    </form>

    <div class="demo-section">
      <p class="demo-text">Don't have an account? <a routerLink="/register">Register here</a></p>
      <button type="button" class="demo-btn" (click)="demoLogin()">
        Use Demo Account
      </button>
      <p class="demo-info">Demo: demo&#64;example.com / demo123</p>
    </div>
  </div>
</div>
